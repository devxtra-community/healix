name: Healix CI/CD

on:
  push:
    branches: [main]
    paths:
      - gateway/**
      - services/**
      - packages/**
      - frontend/web/**
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI (Build Backend + Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm eslint gateway services --ext .ts

      - name: Build Gateway
        run: |
          cd gateway
          pnpm build

      - name: Build Services
        run: |
          for dir in services/*; do
            if [ -f "$dir/package.json" ]; then
              echo "Building $dir"
              (cd "$dir" && pnpm build)
            fi
          done

      - name: Build Frontend
        run: |
          cd frontend/web
          pnpm build

      - name: Prepare backend artifact
        run: |
          rm -rf backend-prod
          mkdir -p backend-prod/gateway
          mkdir -p backend-prod/services

          cp -r gateway/dist backend-prod/gateway/
          cp gateway/package.json backend-prod/gateway/

          for dir in services/*; do
            if [ -d "$dir/dist" ]; then
              name=$(basename "$dir")
              mkdir -p backend-prod/services/$name
              cp -r "$dir/dist" backend-prod/services/$name/
              cp "$dir/package.json" backend-prod/services/$name/
            fi
          done

          if [ -d packages ]; then
            cp -r packages backend-prod/packages
          fi

      - name: Prepare frontend artifact
        run: |
          rm -rf frontend-prod
          mkdir -p frontend-prod

          cp -r frontend/web/.next frontend-prod/
          cp -r frontend/web/public frontend-prod/
          cp frontend/web/package.json frontend-prod/
          cp frontend/web/pnpm-lock.yaml frontend-prod/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-prod
          path: backend-prod

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-prod
          path: frontend-prod

  cd:
    name: CD (Deploy to EC2)
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-prod
          path: backend-prod

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-prod
          path: frontend-prod

      - name: Upload backend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend-prod/*
          target: /var/www/backend-prod
          overwrite: true

      - name: Upload frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: frontend-prod/*
          target: /var/www/frontend-prod
          overwrite: true

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"

            echo "=== Gateway ==="
            cd /var/www/backend-prod/gateway
            pnpm install --prod
            pm2 reload gateway || pm2 start dist/server.js --name gateway

            echo "=== Services ==="
            for dir in /var/www/backend-prod/services/*; do
              cd "$dir"
              name=$(basename "$dir")
              pnpm install --prod
              pm2 reload "$name" || pm2 start dist/server.js --name "$name"
            done

            echo "=== Frontend ==="
            cd /var/www/frontend-prod
            pnpm install --prod
            pm2 reload frontend || pm2 start node_modules/next/dist/bin/next --name frontend -- start -p 3000

            pm2 save