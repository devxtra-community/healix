name: Healix Deploy

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest


steps:

  - name: Checkout repository
    uses: actions/checkout@v4


  - name: Setup pnpm
    uses: pnpm/action-setup@v2
    with:
      version: 9


  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: "pnpm"


  # ---------------- INSTALL ----------------

  - name: Install dependencies
    run: pnpm install --frozen-lockfile


  # ---------------- BUILD ----------------

  - name: Build workspace
    run: pnpm -r run build


  # ---------------- SSH SETUP ----------------

  - name: Setup SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
      chmod 600 ~/.ssh/ec2.pem
      ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts


  # ---------------- PREPARE SERVER ----------------

  - name: Prepare directories
    run: |
      ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
        mkdir -p /var/www/backend
        mkdir -p /var/www/frontend
      EOF


  # ---------------- DEPLOY BACKEND ----------------

  - name: Deploy backend
    run: |
      rsync -avz --delete \
        -e "ssh -i ~/.ssh/ec2.pem" \
        gateway/dist/ \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/backend/gateway/dist/


  - name: Deploy services
    run: |
      rsync -avz --delete \
        -e "ssh -i ~/.ssh/ec2.pem" \
        services/ \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/backend/services/


  # ---------------- DEPLOY FRONTEND ----------------

  - name: Deploy frontend
    run: |

      ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
        rm -rf /var/www/frontend
        mkdir -p /var/www/frontend/.next/static
        mkdir -p /var/www/frontend/public
      EOF

      rsync -avz \
        -e "ssh -i ~/.ssh/ec2.pem" \
        frontend/web/.next/standalone/ \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/frontend/

      rsync -avz \
        -e "ssh -i ~/.ssh/ec2.pem" \
        frontend/web/.next/static/ \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/frontend/.next/static/

      rsync -avz \
        -e "ssh -i ~/.ssh/ec2.pem" \
        frontend/web/public/ \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/frontend/public/


  # ---------------- RESTART SERVICES ----------------

  - name: Restart services
    run: |
      ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

        cd /var/www/backend/gateway
        pm2 reload gateway || pm2 start dist/server.js --name gateway

        for dir in /var/www/backend/services/*; do
          cd "$dir"
          name=$(basename "$dir")
          pm2 reload "$name" || pm2 start dist/server.js --name "$name"
        done

        cd /var/www/frontend
        pm2 reload frontend || PORT=3000 pm2 start server.js --name frontend

        pm2 save

      EOF

