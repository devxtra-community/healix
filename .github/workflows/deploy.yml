name: Healix Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ---------------- CHECKOUT ----------------

      - name: Checkout
        uses: actions/checkout@v4


      # ---------------- NODE + PNPM ----------------

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm


      # ---------------- INSTALL + BUILD ----------------

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r run build


      # ---------------- SSH SETUP ----------------

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts


      # ---------------- PREPARE SERVER ----------------

      - name: Prepare directories
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            rm -rf /var/www/frontend

            # remove only build folders (keeps .env files safe)
            rm -rf /var/www/backend/gateway/dist
            rm -rf /var/www/backend/services

            mkdir -p /var/www/backend/gateway/dist
            mkdir -p /var/www/backend/services

            mkdir -p /var/www/frontend
            mkdir -p /var/www/frontend/.next/static
            mkdir -p /var/www/frontend/public

          EOF


      # ---------------- DEPLOY GATEWAY ----------------

      - name: Deploy Gateway
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/ec2.pem" \
            gateway/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/backend/gateway/dist/

          rsync -avz \
            -e "ssh -i ~/.ssh/ec2.pem" \
            gateway/package.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/backend/gateway/


      # ---------------- DEPLOY SERVICES ----------------

      - name: Deploy Services
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2.pem" \
            services/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/backend/services/


      # ---------------- DEPLOY NEXTJS ----------------

      - name: Deploy Next standalone
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/ec2.pem" \
            frontend/web/.next/standalone/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/frontend/


      - name: Deploy Next static
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/ec2.pem" \
            frontend/web/.next/static/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/frontend/.next/static/


      - name: Deploy public assets
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/ec2.pem" \
            frontend/web/public/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/frontend/public/


      # ---------------- FIX MONOREPO NEXT STRUCTURE ----------------

      - name: Fix standalone structure
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            if [ -d "/var/www/frontend/frontend/web" ]; then
              rsync -a /var/www/frontend/frontend/web/ /var/www/frontend/
              rm -rf /var/www/frontend/frontend
            fi

          EOF


      # ---------------- RESTART SERVICES ----------------

      - name: Restart services
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            echo "Restarting gateway..."

            cd /var/www/backend/gateway
            pnpm install --prod
            pm2 reload gateway || pm2 start dist/server.js --name gateway


            echo "Restarting services..."

            for dir in /var/www/backend/services/*; do
              cd "$dir"
              name=$(basename "$dir")

              pnpm install --prod

              if [ -f "dist/server.js" ]; then
                pm2 reload "$name" || pm2 start dist/server.js --name "$name"
              fi
            done


            echo "Restarting frontend..."

            cd /var/www/frontend
            pnpm install --prod
            pm2 reload frontend || PORT=3000 pm2 start server.js --name frontend


            pm2 save

          EOF